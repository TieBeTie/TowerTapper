version: "3.8"
services:
  db:
    image: custom-postgres
    container_name: tower_tapper_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backnet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  server:
    image: ${DOCKER_USERNAME}/towertapper-server:latest
    container_name: tower_tapper_server
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SERVER_PORT=${SERVER_PORT}
      - TEST_MODE=${TEST_MODE}
      - CLIENT_URL=${CLIENT_URL}
      - SERVER_URL=${SERVER_URL}
      - BOT_TOKEN=${BOT_TOKEN}
    volumes:
      - ./.env:/app/.env:ro
      - ./.env:/.env:ro
    expose:
      - "8080"
    networks:
      - backnet
      - frontnet
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  client:
    image: ${DOCKER_USERNAME}/towertapper-client:latest
    container_name: tower_tapper_client
    expose:
      - "80"
    networks:
      - frontnet
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  caddy:
    image: caddy:latest
    container_name: tower_tapper_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontnet
    depends_on:
      - server
      - client
    restart: always

networks:
  backnet:
    driver: bridge
  frontnet:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
