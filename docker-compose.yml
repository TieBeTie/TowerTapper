version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: tower_tapper_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tower_tapper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tower_tapper_server
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=tower_tapper
      - BOT_TOKEN=${BOT_TOKEN}
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: 