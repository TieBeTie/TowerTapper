<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fffefe;
            position: fixed;
            touch-action: none;
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Стили для мобильных устройств */
        @media (max-width: 768px) {
            #game-container {
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
</body>

</html>
