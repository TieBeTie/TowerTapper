<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Улучшение рендеринга текста */
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            font-family: 'pixelFont', sans-serif;
            /* Выключаем сглаживание для пиксельных шрифтов */
            font-smooth: never;
            -webkit-font-smoothing: none;
        }
        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Обеспечиваем рендеринг пиксель-в-пиксель */
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Стили для мобильных устройств */
        @media (max-width: 768px) {
            #game-container {
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <a target="_blank" href="https://jam.pieter.com" style="font-family: 'system-ui', sans-serif; position: fixed; top: 0; right: 0; padding: 7px; font-size: 14px; font-weight: bold; background: #fff; color: #000; text-decoration: none; z-index: 10; border-bottom-left-radius: 12px; z-index: 10000; border: 1px solid #fff;">🕹️ Vibe Jam 2025</a>
</body>

</html>
